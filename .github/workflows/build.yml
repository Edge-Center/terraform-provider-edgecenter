name: build

on:
  pull_request:
    branches: [master, main, release-cloud, instanceV2]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  EC_USERNAME: ${{ secrets.EC_USERNAME }}
  EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
  EC_API: ${{ secrets.EC_API }}
  EC_CDN_URL: ${{ secrets.EC_CDN_URL }}
  EC_DNS_API: ${{ secrets.EC_DNS_API }}
  EC_PLATFORM: ${{ secrets.EC_PLATFORM }}
  EC_STORAGE_API: ${{ secrets.EC_STORAGE_API }}
  TEST_PROJECT_ID: ${{ secrets.TEST_PROJECT_ID }}
  TEST_REGION_ID: ${{ secrets.TEST_REGION_ID }}
  TEST_MKAAS_REGION_ID: ${{ secrets.TEST_MKAAS_REGION_ID }}
  TF_ACC: ${{ secrets.TF_ACC }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.f.outputs.shared }}
      cloud: ${{ steps.f.outputs.cloud }}
      mkaas: ${{ steps.f.outputs.mkaas }}
      cdn: ${{ steps.f.outputs.cdn }}
      dns: ${{ steps.f.outputs.dns }}
      storage: ${{ steps.f.outputs.storage }}
      reseller: ${{ steps.f.outputs.reseller }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: .github/paths-filters.yml

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Linters
        run: make linters

  reseller-tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.reseller == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_RESELLER_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_RESELLER_PERMANENT_TOKEN }}
    strategy:
      matrix:
        kind:
          - tag: cloud_reseller_data_source
          - tag: cloud_reseller_resource
      fail-fast: false
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Run tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=10m

  tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.cloud == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
    strategy:
      matrix:
        kind:
          - tag: cloud_data_source
          - tag: cloud_resource
      fail-fast: false
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Sweep stale test resources
        run: go test -v ./edgecenter/test -tags sweeper -sweep=all -timeout=10m
        continue-on-error: true
      - name: Run tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=20m

  mkaas-tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.mkaas == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
      TEST_MKAAS_REGION_ID: ${{ secrets.TEST_MKAAS_REGION_ID }}
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/.terraformrc-ci
    strategy:
      matrix:
        kind:
          - tag: cloud_data_source_mkaas
            timeout: 30m
          - tag: cloud_resource_mkaas
            timeout: 30m
      fail-fast: false
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Build local provider
        run: |
          mkdir -p "$RUNNER_TEMP/provider-dev"
          go build -o "$RUNNER_TEMP/provider-dev/terraform-provider-edgecenter" main.go
          chmod +x "$RUNNER_TEMP/provider-dev/terraform-provider-edgecenter"
          ls -la "$RUNNER_TEMP/provider-dev"
      - name: Configure Terraform for local provider
        run: |
          cat > "$TF_CLI_CONFIG_FILE" <<EOF
          provider_installation {
            dev_overrides {
              "Edge-Center/edgecenter" = "$RUNNER_TEMP/provider-dev"
            }
            direct {}
          }
          EOF
      - name: Verify Terraform configuration
        run: |
          cat "$TF_CLI_CONFIG_FILE"
          terraform version
      - name: Verify dev override is active
        run: |
          tmp_dir="$(mktemp -d)"
          cat > "$tmp_dir/main.tf" <<'EOF'
          terraform {
            required_providers {
              edgecenter = {
                source = "Edge-Center/edgecenter"
              }
            }
          }
          provider "edgecenter" {}
          EOF
          terraform -chdir="$tmp_dir" init -input=false -no-color
          terraform -chdir="$tmp_dir" providers
      - name: Sweep stale MKAAS resources
        run: go test -v ./edgecenter/test -tags sweeper -sweep=edgecenter_mkaas_cluster -timeout=10m
        continue-on-error: true
      - name: Run MKAAS tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=${{ matrix.kind.timeout }}

  metrics:
    needs: [smoke, reseller-tests, tests, mkaas-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: none
    steps:
      - name: Wall-clock summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOBS_API: repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs
        run: |
          set -euo pipefail

          jobs_json=$(gh api "$JOBS_API")

          {
            echo "## CI wall-clock"
            echo ""
            echo "| Job | Status | Duration |"
            echo "|-----|--------|----------|"
            jq -r '
              .jobs
              | map(select(.name != "metrics"))
              | sort_by(.started_at)[]
              | "| \(.name) | \(.conclusion // "running") | \(
                  (((.completed_at // (now | todate)) | fromdate)
                   - (.started_at | fromdate))
                  / 60 | floor
                )m |"
            ' <<<"$jobs_json"

            echo ""
            jq -r '
              (.jobs | map(select(.name != "metrics"))) as $j
              | ($j | map(.started_at | fromdate) | min) as $start
              | ($j | map((.completed_at // (now | todate)) | fromdate) | max) as $end
              | "**Total wall-clock:** \((($end - $start) / 60) | floor)m"
            ' <<<"$jobs_json"
          } >> "$GITHUB_STEP_SUMMARY"
