name: build

on:
  pull_request:
    branches: [master, main, release-cloud, instanceV2]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  EC_USERNAME: ${{ secrets.EC_USERNAME }}
  EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
  EC_API: ${{ secrets.EC_API }}
  EC_CDN_URL: ${{ secrets.EC_CDN_URL }}
  EC_DNS_API: ${{ secrets.EC_DNS_API }}
  EC_PLATFORM: ${{ secrets.EC_PLATFORM }}
  EC_STORAGE_API: ${{ secrets.EC_STORAGE_API }}
  TEST_PROJECT_ID: ${{ secrets.TEST_PROJECT_ID }}
  TEST_REGION_ID: ${{ secrets.TEST_REGION_ID }}
  TEST_MKAAS_REGION_ID: ${{ secrets.TEST_MKAAS_REGION_ID }}
  TF_ACC: ${{ secrets.TF_ACC }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.f.outputs.shared }}
      cloud: ${{ steps.f.outputs.cloud }}
      mkaas: ${{ steps.f.outputs.mkaas }}
      cdn: ${{ steps.f.outputs.cdn }}
      dns: ${{ steps.f.outputs.dns }}
      storage: ${{ steps.f.outputs.storage }}
      reseller: ${{ steps.f.outputs.reseller }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: .github/paths-filters.yml

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Linters
        run: make linters

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Run integration tests
        run: go test -tags=integration -v -count=1 ./edgecenter/integrationtest/...

  reseller-tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.reseller == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_RESELLER_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_RESELLER_PERMANENT_TOKEN }}
    strategy:
      matrix:
        kind:
          - tag: cloud_reseller_data_source
          - tag: cloud_reseller_resource
      fail-fast: false
      max-parallel: 1
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Run tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=10m

  tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.cloud == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
    strategy:
      matrix:
        kind:
          - tag: cloud_data_source
          - tag: cloud_resource
      fail-fast: false
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Sweep stale test resources
        run: go test -v ./edgecenter/test -tags sweeper -sweep=all -timeout=10m
        continue-on-error: true
      - name: Run tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=20m
        continue-on-error: true

  mkaas-tests:
    needs: [smoke, detect]
    if: needs.detect.outputs.mkaas == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_CLIENT_ID: ${{ secrets.EC_CLIENT_ID }}
      EC_PERMANENT_TOKEN: ${{ secrets.EC_PERMANENT_TOKEN }}
      TEST_MKAAS_REGION_ID: ${{ secrets.TEST_MKAAS_REGION_ID }}
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/.terraformrc-ci
    strategy:
      matrix:
        kind:
          - tag: cloud_data_source_mkaas
            timeout: 30m
          - tag: cloud_resource_mkaas
            timeout: 30m
      fail-fast: false
      max-parallel: 1
    name: tests-${{ matrix.kind.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Build local provider
        run: |
          mkdir -p "$RUNNER_TEMP/provider-dev"
          go build -o "$RUNNER_TEMP/provider-dev/terraform-provider-edgecenter" main.go
          chmod +x "$RUNNER_TEMP/provider-dev/terraform-provider-edgecenter"
          ls -la "$RUNNER_TEMP/provider-dev"
      - name: Configure Terraform for local provider
        run: |
          cat > "$TF_CLI_CONFIG_FILE" <<EOF
          provider_installation {
            dev_overrides {
              "Edge-Center/edgecenter" = "$RUNNER_TEMP/provider-dev"
            }
            direct {}
          }
          EOF
      - name: Verify Terraform configuration
        run: |
          cat "$TF_CLI_CONFIG_FILE"
          terraform version
      - name: Verify dev override is active
        run: |
          tmp_dir="$(mktemp -d)"
          cat > "$tmp_dir/main.tf" <<'EOF'
          terraform {
            required_providers {
              edgecenter = {
                source = "Edge-Center/edgecenter"
              }
            }
          }
          provider "edgecenter" {}
          EOF
          terraform -chdir="$tmp_dir" init -input=false -no-color
          terraform -chdir="$tmp_dir" providers
      - name: Sweep stale MKAAS resources
        run: go test -v ./edgecenter/test -tags sweeper -sweep=edgecenter_mkaas_cluster -timeout=10m
        continue-on-error: true
      - name: Run MKAAS tests (${{ matrix.kind.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.kind.tag }} -short -timeout=${{ matrix.kind.timeout }}
        continue-on-error: true

  not-cloud-tests:
    needs: [smoke, detect]
    if: >-
      needs.detect.outputs.cdn == 'true' || needs.detect.outputs.dns == 'true' ||
      needs.detect.outputs.storage == 'true' || needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    env:
      EC_PERMANENT_TOKEN: ${{ matrix.tag == 'cdn' && secrets.EC_CDN_PERMANENT_TOKEN || secrets.EC_PERMANENT_TOKEN }}
      EC_CDN_API: ${{ matrix.tag == 'cdn' && secrets.EC_CDN_API || '' }}
    strategy:
      matrix:
        tag: [cdn, dns, storage]
      fail-fast: false
    name: tests-${{ matrix.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0
      - name: Run tests (${{ matrix.tag }})
        run: go test -v ./edgecenter/test -tags ${{ matrix.tag }} -timeout=15m

  metrics:
    needs: [smoke, integration-tests, reseller-tests, tests, mkaas-tests, not-cloud-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: none
    env:
      TARGET_SECONDS: 1800
    steps:
      - name: Wall-clock summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          run_started_at=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq '.run_started_at')
          jobs_json=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs")

          report=$(jq -r --arg run_started "$run_started_at" '
            def fmt(s):
              (s | floor) as $i
              | if $i < 60 then "\($i)s"
                else "\(($i / 60) | floor)m \($i % 60)s"
                end;

            ($run_started | fromdate) as $start
            | .jobs
            | map(select(.name != "metrics"))
            | map(. + {
                sec: (((.completed_at // (now | todate)) | fromdate) - (.started_at | fromdate)),
                current: ((.started_at | fromdate) >= $start)
              })
            | sort_by(.started_at)
            | (map(select(.current))
                | map((.completed_at // (now | todate)) | fromdate)
                | (max // null)) as $end
            | (if $end == null then 0 else ($end - $start | floor) end) as $total
            | {
                rows_full: map("| \(.name) | \(.conclusion // "running") | \(fmt(.sec)) | \(if .current then "this attempt" else "cached" end) |") | join("\n"),
                rows_plain: map("| \(.name) | \(.conclusion // "running") | \(fmt(.sec)) |") | join("\n"),
                total_sec: $total,
                total_fmt: fmt($total),
                cached: (map(select(.current | not)) | length)
              }
          ' <<<"$jobs_json")

          total_sec=$(jq -r '.total_sec' <<<"$report")
          total_fmt=$(jq -r '.total_fmt' <<<"$report")
          cached=$(jq -r '.cached' <<<"$report")
          target_min=$((TARGET_SECONDS / 60))

          if [ "$total_sec" -le "$TARGET_SECONDS" ]; then
            status="within target"
            indicator="ok"
          else
            status="exceeds target"
            indicator="over"
          fi

          if [ "$cached" -gt 0 ]; then
            rows=$(jq -r '.rows_full' <<<"$report")
            header="| Job | Status | Duration | Source |"
            sep="|-----|--------|----------|--------|"
          else
            rows=$(jq -r '.rows_plain' <<<"$report")
            header="| Job | Status | Duration |"
            sep="|-----|--------|----------|"
          fi

          {
            echo "## CI wall-clock (attempt $GITHUB_RUN_ATTEMPT)"
            echo ""
            echo "$header"
            echo "$sep"
            echo "$rows"
            echo ""
            echo "**Total (this attempt):** $total_fmt"
            echo "**Target:** ${target_min}m. **Result:** $status"
            if [ "$cached" -gt 0 ]; then
              echo ""
              echo "_${cached} job(s) cached from prior attempts; not included in total._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=ci-metrics::attempt=$GITHUB_RUN_ATTEMPT total_sec=$total_sec target_sec=$TARGET_SECONDS status=$indicator cached_jobs=$cached"
